display_information:
  name: OpenClaw HITL
  description: OpenClaw approvals and operational fallback commands
  background_color: "#1F2937"
features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: true
  bot_user:
    display_name: OpenClaw
    always_online: false
  slash_commands:
    - command: /oc-approve
      description: Approve a decision or operation
      usage_hint: "<decision_id> [challenge]"
      should_escape: false
      # Placeholder required by Slack schema even when using Socket Mode.
      url: https://example.invalid/slack/commands
    - command: /oc-reject
      description: Reject a decision or operation
      usage_hint: "<decision_id> [reason]"
      should_escape: false
      url: https://example.invalid/slack/commands
    - command: /oc-kill
      description: Kill a decision or operation immediately
      usage_hint: "<decision_id|operation_id> [challenge]"
      should_escape: false
      url: https://example.invalid/slack/commands
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - chat:write
      - commands
      - groups:history
      - im:history
      - mpim:history
settings:
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
  event_subscriptions:
    # Placeholder required by Slack schema even when using Socket Mode.
    request_url: https://example.invalid/slack/events
    bot_events:
      - app_mention
      - message.im
  interactivity:
    is_enabled: true
    # Placeholder required by Slack schema even when using Socket Mode.
    request_url: https://example.invalid/slack/interactivity
