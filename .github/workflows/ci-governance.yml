name: ci-governance

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shell tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt
      - name: shellcheck
        run: |
          shellcheck scripts/onboard_linux.sh scripts/verify_linux.sh
          shellcheck scripts/runtime/*.sh
          shellcheck scripts/ci/*.sh
      - name: shfmt
        run: shfmt -d scripts/onboard_linux.sh scripts/verify_linux.sh scripts/runtime/*.sh scripts/ci/*.sh

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff black
      - name: Lint
        run: make policy-lint

  typecheck-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install mypy
      - name: Typecheck
        run: make policy-typecheck

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Unit tests
        run: make policy-test-unit

  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Integration tests
        run: make policy-test-integration

  test-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Contract tests
        run: make policy-test-contract

  e2e-chaos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run e2e and chaos suite
        run: |
          make e2e-test
          make chaos-test

  event-ledger-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: openclaw
          POSTGRES_PASSWORD: openclaw
          POSTGRES_DB: openclaw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openclaw -d openclaw"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install postgres driver
        run: |
          python -m pip install --upgrade pip
          pip install psycopg[binary]
      - name: Run ledger integration test
        env:
          OPENCLAW_EVENT_LEDGER_DSN: postgresql://openclaw:openclaw@127.0.0.1:5432/openclaw
        run: make e2e-test

  governance-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Governance evals
        run: |
          make eval-models
          make eval-integrations
          make ci-quality
          make ci-security
          make phase1-critical-suite
      - name: Upload governance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-artifacts
          path: artifacts/generated/ci/
          if-no-files-found: warn

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit --progress-spinner off --requirement requirements-docling.txt
