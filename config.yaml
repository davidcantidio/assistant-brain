model_list:
  # Cloud-first primary supervisor
  - model_name: openrouter-main
    litellm_params:
      model: openrouter/openai/gpt-4o-mini

  # Cloud-first review supervisor
  - model_name: openrouter-review
    litellm_params:
      model: openrouter/openai/gpt-4o-mini

  # Local contingency fallback (7B)
  - model_name: local-fallback-7b
    litellm_params:
      model: ollama_chat/qwen2.5:7b-instruct-q8_0
      api_base: http://localhost:11434
      num_ctx: 32768

  # Embeddings (RAG)
  - model_name: qwen3-embed
    litellm_params:
      model: ollama/qwen3-embedding:8b
      api_base: http://localhost:11434

  # Reranker (RAG) - via vLLM
  - model_name: bge-reranker
    litellm_params:
      model: hosted_vllm/BAAI/bge-reranker-v2-m3
      api_base: http://localhost:8000
